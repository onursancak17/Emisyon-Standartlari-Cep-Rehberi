name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate offline APK assets
        run: |
          python3 scripts/validate_assets.py

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create clean Flutter Android project
        run: |
          set -e
          mkdir -p /tmp/mobile_build
          flutter create /tmp/mobile_build --platforms=android --project-name emisyon_standartlari_cep_rehberi --org com.onursancak
          rm -rf /tmp/mobile_build/lib /tmp/mobile_build/assets
          cp -r lib /tmp/mobile_build/lib
          cp -r assets /tmp/mobile_build/assets
          cp pubspec.yaml /tmp/mobile_build/pubspec.yaml

      - name: Install dependencies
        working-directory: /tmp/mobile_build
        run: flutter pub get

      - name: Analyze Flutter project
        working-directory: /tmp/mobile_build
        run: flutter analyze

      - name: Build APK
        working-directory: /tmp/mobile_build
        run: flutter build apk --release

      - name: Copy APK to repository workspace
        run: |
          mkdir -p build-output
          cp /tmp/mobile_build/build/app/outputs/flutter-apk/app-release.apk build-output/emisyon-standartlari-cep-rehberi.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: emisyon-standartlari-cep-rehberi-apk
          path: build-output/emisyon-standartlari-cep-rehberi.apk
          if-no-files-found: error
