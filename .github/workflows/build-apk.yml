name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate offline APK assets
        run: |
          python3 scripts/validate_assets.py || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create clean Flutter Android project
        run: |
          set -e
          rm -rf /tmp/mobile_build
          flutter create /tmp/mobile_build --platforms=android --project-name emisyon_standartlari_cep_rehberi --org com.onursancak
          rm -rf /tmp/mobile_build/lib /tmp/mobile_build/assets
          cp -r lib /tmp/mobile_build/lib
          cp -r assets /tmp/mobile_build/assets
          cp pubspec.yaml /tmp/mobile_build/pubspec.yaml

      - name: Set Android app display name
        run: |
          set -e
          mkdir -p /tmp/mobile_build/android/app/src/main/res/values
          cat > /tmp/mobile_build/android/app/src/main/res/values/strings.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Emisyon İmisyon Ölçüm Standartları</string>
          </resources>
          XML
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest_path = Path('/tmp/mobile_build/android/app/src/main/AndroidManifest.xml')
          text = manifest_path.read_text(encoding='utf-8')
          text = re.sub(r'android:label="[^"]+"', 'android:label="@string/app_name"', text, count=1)
          manifest_path.write_text(text, encoding='utf-8')
          print(manifest_path.read_text(encoding='utf-8'))
          PY

      - name: Install dependencies
        working-directory: /tmp/mobile_build
        run: flutter pub get

      - name: Analyze Flutter project
        working-directory: /tmp/mobile_build
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        working-directory: /tmp/mobile_build
        run: flutter build apk --release

      - name: Copy APK to repository workspace
        run: |
          mkdir -p build-output
          cp /tmp/mobile_build/build/app/outputs/flutter-apk/app-release.apk build-output/emisyon-imisyon-olcum-standartlari.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: emisyon-imisyon-olcum-standartlari-apk
          path: build-output/emisyon-imisyon-olcum-standartlari.apk
          if-no-files-found: error
